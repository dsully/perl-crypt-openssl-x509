name: cygwin

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:
    branches:
      - '*'
env:
  CYGWIN_NOWINPATH: 1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perl:
    name: cygwin

    runs-on: windows-latest

    strategy:
      fail-fast: false

    defaults:
      run:
        shell: C:\tools\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
        shell: powershell

      - name: Checkout repository
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
        with:
          persist-credentials: false

      - name: Set up Cygwin
        uses: egor-tensin/setup-cygwin@0c5b8b7b0f35a493f5b8c2687c5fd204c2628538 # v3.0.1
        with:
          platform: x64
          packages: make perl gcc-core gcc-g++ pkg-config libcrypt-devel libssl-devel git curl

      - name: perl -V
        run: |
          perl -V
          gcc --version
      - name: Run Tests
        run: |
          cd $( cygpath -u $GITHUB_WORKSPACE )
          curl -sL https://cpanmin.us/ | perl - -nq --with-configure --with-develop --installdeps -v .
          perl Makefile.PL
          make
          make test
